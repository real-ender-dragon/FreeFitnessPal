<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FreeFitnessPal</title>
    
    <link rel="manifest" href="./manifest.json">
    <link rel="stylesheet" href="./style.css">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <script src="https://cdn.jsdelivr.net/npm/@ericblade/quagga2/dist/quagga.min.js"></script>
    <script src="https://unpkg.com/dexie@latest/dist/dexie.js"></script>
</head>
<body>

    <div id="main-view" class="view-container" style="display: none;">
        <header class="main-header">
            <h1>Diary</h1>
        </header>
        <div id="ui-container"></div>
    </div>


    <div id="search-view" class="view-container">
        <div class="search-header">
            
            <div class="search-input-wrapper" style="margin-left: 0;">
                <span class="search-icon">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#8E8E93" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                </span>
                <input type="text" id="food-search-input" placeholder="Search for food..." autocomplete="off" />
            </div>

            <button id="nav-scan-btn" class="icon-btn" style="margin-left: 12px;">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 7V5a2 2 0 0 1 2-2h2"></path>
                    <path d="M17 3h2a2 2 0 0 1 2 2v2"></path>
                    <path d="M21 17v2a2 2 0 0 1-2 2h-2"></path>
                    <path d="M7 21H5a2 2 0 0 1-2-2v-2"></path>
                    <line x1="7" y1="12" x2="17" y2="12"></line>
                </svg>
            </button>
            
        </div>
        
        <ul id="search-results-list"></ul>
    </div>


    <div id="scanner-view" class="view-container" style="display: none;">
        <div class="scanner-header">
            <button id="close-scanner-btn" class="icon-btn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            </button>
            
            <div style="display: flex; gap: 8px;">
                <button id="torch-btn" onclick="toggleFlash()" style="display: none;" class="icon-btn">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>
                </button>
                <button id="manual-barcode-btn" class="icon-btn" aria-label="Enter manually">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="4" width="18" height="16" rx="2" ry="2"></rect>
                        <line x1="7" y1="8" x2="7.01" y2="8"></line>
                        <line x1="12" y1="8" x2="12.01" y2="8"></line>
                        <line x1="17" y1="8" x2="17.01" y2="8"></line>
                        <line x1="7" y1="12" x2="7.01" y2="12"></line>
                        <line x1="12" y1="12" x2="12.01" y2="12"></line>
                        <line x1="17" y1="12" x2="17.01" y2="12"></line>
                        <line x1="9" y1="16" x2="15" y2="16"></line>
                    </svg>
                </button>
            </div>
        </div>

        <div id="interactive" class="viewport"></div>
    </div>
    <div id="food-detail-view" class="view-container" style="display: none;">
        <div class="search-header">
            <button id="close-detail-btn" class="icon-btn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            </button>
        </div>

        <div class="detail-content">
            <h2 id="detail-name" class="detail-title">Food Name</h2>
            
            <div class="calories-showcase">
                <span id="detail-calories" class="huge-calories">0</span>
                <span class="kcal-label">kcal</span>
            </div>

            <div class="macros-grid">
                <div class="macro-box">
                    <span class="macro-label">Carbs</span>
                    <span id="detail-carbs" class="macro-value carbs-color">0g</span>
                </div>
                <div class="macro-box">
                    <span class="macro-label">Protein</span>
                    <span id="detail-protein" class="macro-value protein-color">0g</span>
                </div>
                <div class="macro-box">
                    <span class="macro-label">Fat</span>
                    <span id="detail-fat" class="macro-value fat-color">0g</span>
                </div>
            </div>

            <div class="portion-input-container">
                <input type="number" id="detail-amount" inputmode="decimal" value="100">
                <span class="unit-label">grams</span>
            </div>

            <button id="save-to-diary-btn" class="save-btn">Add to Diary</button>
        </div>
    </div>

    <script src="./food-detail.js"></script>
    <script src="./app.js"></script>

    <script src="./app.js"></script>
    
    <script>
        // Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .catch(err => console.error('SW failed:', err));
            });
        }

        // View Management
        const searchView = document.getElementById('search-view');
        const scannerView = document.getElementById('scanner-view');

        // Focus search bar on load
        window.onload = () => {
            document.getElementById('food-search-input').focus();
        };

        // Open Scanner from Search Bar
        document.getElementById('nav-scan-btn').addEventListener('click', () => {
            searchView.style.display = 'none';
            scannerView.style.display = 'block';
            startScanner(); 
        });

        // Close Scanner and return to Search Bar
        document.getElementById('close-scanner-btn').addEventListener('click', () => {
            // FIXED: Use the new global stopScanner function
            stopScanner(); 
            
            scannerView.style.display = 'none';
            searchView.style.display = 'block';
        });

        // Manual Barcode Entry Logic
        document.getElementById('manual-barcode-btn').addEventListener('click', () => {
            // 1. First, cleanly shut down the camera to PREVENT the iOS Safari crash
            stopScanner();
            
            // 2. Switch UI immediately back to the search page
            scannerView.style.display = 'none';
            searchView.style.display = 'block';
            
            // 3. Use a tiny delay to allow the camera hardware to turn off 
            // before the prompt() blocks the browser thread
            setTimeout(() => {
                const manualCode = prompt("Enter barcode number:");
                
                // If they typed something and didn't hit cancel
                if (manualCode && manualCode.trim() !== "") {
                    // Fire off your existing process function from app.js
                    processBarcode(manualCode.trim());
                }
            }, 100);
        });
    </script>
</body>
</html>
