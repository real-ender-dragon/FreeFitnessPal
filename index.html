<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FreeFitnessPal</title>
    
    <link rel="manifest" href="./manifest.json">
    <link rel="stylesheet" href="./style.css">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <script src="https://cdn.jsdelivr.net/npm/@ericblade/quagga2/dist/quagga.min.js"></script>
    <script src="https://unpkg.com/dexie@latest/dist/dexie.js"></script>
</head>
<body>

    <div id="main-view" class="view-container">
        <header class="main-header">
            <h1>Tracker</h1>
        </header>
        
        <div class="quick-actions">
            <button id="open-search-btn" class="action-btn">Search Food</button>
            <button id="start-scan-btn" class="action-btn">Scan Barcode</button>
        </div>

        <div id="ui-container"></div>
    </div>


    <div id="search-view" class="view-container" style="display: none;">
        <div class="search-header">
            <button id="close-search-btn" class="icon-btn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            </button>
            
            <div class="search-input-wrapper">
                <span class="search-icon">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#8E8E93" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                </span>
                <input type="text" id="food-search-input" placeholder="Search for food..." autocomplete="off" />
            </div>
        </div>
        
        <ul id="search-results-list"></ul>
    </div>


    <div id="scanner-view" class="view-container" style="display: none;">
        
        <div class="scanner-header">
            <button id="close-scanner-btn" class="icon-btn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            </button>
            <button id="torch-btn" onclick="toggleFlash()" style="display: none;" class="icon-btn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>
            </button>
        </div>

        <div id="interactive" class="viewport"></div>
    </div>


    <script src="./app.js"></script>
    
    <script>
        // Service Worker Registration
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('Service Worker registered successfully.', reg))
                    .catch(err => console.error('Service Worker registration failed:', err));
            });
        }

        // View Management Logic (You can move this to app.js later)
        const mainView = document.getElementById('main-view');
        const searchView = document.getElementById('search-view');
        const scannerView = document.getElementById('scanner-view');

        // Open Search
        document.getElementById('open-search-btn').addEventListener('click', () => {
            mainView.style.display = 'none';
            searchView.style.display = 'block';
            document.getElementById('food-search-input').focus();
        });

        // Close Search
        document.getElementById('close-search-btn').addEventListener('click', () => {
            searchView.style.display = 'none';
            mainView.style.display = 'block';
        });

        // Open Scanner (Assumes you have a startScanner() in app.js)
        document.getElementById('start-scan-btn').addEventListener('click', () => {
            mainView.style.display = 'none';
            scannerView.style.display = 'block';
            startScanner(); // Call your Quagga init logic here
        });

        // Close Scanner
        document.getElementById('close-scanner-btn').addEventListener('click', () => {
            scannerView.style.display = 'none';
            mainView.style.display = 'block';
            Quagga.stop(); // Stop the camera
        });
    </script>
</body>
</html>
