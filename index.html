<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FreeFitnessPal</title>
    
    <link rel="manifest" href="./manifest.json">
    <link rel="stylesheet" href="./style.css">
    
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <script src="https://unpkg.com/dexie@latest/dist/dexie.js"></script>
</head>
<body>
    <h1>Tracker</h1>
    
    <!-- The camera feed will inject here -->
    <button id="start-scan-btn" onclick="startScanner()">Scan Barcode</button>
    <button id="torch-btn" onclick="toggleFlash()" style="display: none;">Toggle Flash</button>
    <div id="reader"></div>
    <div id="reader"></div>
    <div id="reader"></div>
    <div id="search-container">
        <input type="text" id="food-search" placeholder="Search raw foods (e.g., Hafer)...">
        <ul id="search-results"></ul>
    </div>
    
    <!-- We will inject the UI for scanned macros here later -->
    <div id="ui-container"></div>
    
    <script src="./app.js"></script>
    
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('Service Worker registered successfully.', reg))
                    .catch(err => console.error('Service Worker registration failed:', err));
            });
        }
    </script>
</body>
</html>
